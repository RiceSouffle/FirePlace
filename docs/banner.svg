<svg width="1200" height="340" viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FirePlace — a slow, monochrome gallery of beautiful things.">
  <rect width="1200" height="340" fill="#0A0A0B"/>
  <!-- hairline frame -->
  <rect x="0.5" y="0.5" width="1199" height="339" fill="none" stroke="#2C2C31"/>

  <!-- wordmark -->
  <text x="72" y="150" font-family="'Space Grotesk', 'Archivo', 'Helvetica Neue', Arial, sans-serif"
        font-size="86" font-weight="700" letter-spacing="-2" fill="#FAFAF7">FIREPLACE</text>

  <!-- tagline (mono voice) -->
  <text x="74" y="196" font-family="'Space Mono', 'SFMono-Regular', Menlo, Consolas, monospace"
        font-size="20" letter-spacing="1" fill="#A2A2A8">A calmer way to look at beautiful things.</text>

  <!-- source line -->
  <text x="74" y="250" font-family="'Space Mono', 'SFMono-Regular', Menlo, Consolas, monospace"
        font-size="13" letter-spacing="3" fill="#66666C">THE MET &#183; WIKIMEDIA &#183; THE CAT API &#183; PICSUM</text>

  <!-- gallery frames motif -->
  <g stroke="#2C2C31" fill="none">
    <rect x="854" y="96" width="86" height="112"/>
    <rect x="952" y="96" width="86" height="112"/>
    <rect x="1050" y="96" width="86" height="112"/>
  </g>
  <g fill="#141416">
    <rect x="862" y="120" width="70" height="64"/>
    <rect x="960" y="112" width="70" height="80"/>
    <rect x="1058" y="128" width="70" height="52"/>
  </g>
  <!-- one inverted frame (active) -->
  <rect x="952" y="96" width="86" height="112" fill="none" stroke="#FAFAF7"/>
</svg>
